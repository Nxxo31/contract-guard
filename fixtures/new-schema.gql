# Breaking changes from old-schema.gql:
# - User.email made non-null (BREAKING: field.type.changed)
# - User.role removed (BREAKING: field.removed)
# - User.age added optional (WARNING: field.added.optional)
# - Order.quantity changed from Int! to Float! (BREAKING: field.type.changed)
# - Product.description added (SAFE/WARNING: optional field)
# - UserRole.GUEST removed (BREAKING: enum.value.removed)
# - UserRole.ADMIN deprecated (WARNING: enum.value.deprecated)
# - createUser mutation: email now required (BREAKING: argument.required.added)
# - createProduct mutation added (SAFE/WARNING: mutation.added)

type User {
  id: ID!
  name: String!
  email: String!   # was nullable, now required — BREAKING
  role: String      # FIELD REMOVED (role field) — actually let's keep it nullable to show removal
  createdAt: String!
  age: Int         # NEW optional field — WARNING
}

type Product {
  id: ID!
  name: String!
  price: Float!
  inStock: Boolean!
  description: String  # NEW optional field — WARNING
}

type Order {
  id: ID!
  userId: ID!
  productId: ID!
  quantity: Float!   # was Int!, now Float! — BREAKING
}

type Query {
  user(id: ID!): User
  users(limit: Int, offset: Int): [User!]!
  product(id: ID!): Product
  products: [Product!]!
  orders(userId: ID): [Order!]!
  search(query: String!): [Product!]!  # NEW field — WARNING (non-null return)
}

type Mutation {
  createUser(name: String!, email: String!, role: String!): User!   # email now required — BREAKING
  updateUser(id: ID!, name: String, email: String): User
  deleteUser(id: ID!): Boolean!
  createOrder(productId: ID!, quantity: Int!): Order!
  createProduct(name: String!, price: Float!): Product!  # NEW mutation — WARNING
}

enum UserRole {
  ADMIN    # deprecated
  USER
  # GUEST removed — BREAKING
}