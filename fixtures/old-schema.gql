type User {
  id: ID!
  name: String!
  email: String
  role: String!
  createdAt: String!
}

type Product {
  id: ID!
  name: String!
  price: Float!
  inStock: Boolean!
}

type Order {
  id: ID!
  userId: ID!
  productId: ID!
  quantity: Int!
}

type Query {
  user(id: ID!): User
  users(limit: Int, offset: Int): [User!]!
  product(id: ID!): Product
  products: [Product!]!
  orders(userId: ID): [Order!]!
}

type Mutation {
  createUser(name: String!, email: String, role: String!): User!
  updateUser(id: ID!, name: String, email: String): User
  deleteUser(id: ID!): Boolean!
  createOrder(productId: ID!, quantity: Int!): Order!
}

enum UserRole {
  ADMIN
  USER
  GUEST
}